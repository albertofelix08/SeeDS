<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeeDS — Data Structure Visualizer</title>
  <meta name="description" content="Visualize data structures and their bugs in 3D. Code in, animation out." />

  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <link rel="stylesheet" href="./styles/main.css" />
  <link rel="stylesheet" href="./styles/toolbar.css" />
  <link rel="stylesheet" href="./styles/panels.css" />
  <link rel="stylesheet" href="./styles/code-panel.css" />
  <link rel="stylesheet" href="./styles/editor.css" />
</head>

<body>

  <!-- TOP BAR — spans full width -->
  <div id="toolbar"></div>

  <!-- STATUS BAR — below toolbar, above editor + canvas -->
  <div id="status-bar"></div>

  <!-- MAIN APP LAYOUT: editor left, canvas right -->
  <div id="app-layout">
    <!-- CODE PANEL — left side, Monaco editor + analyzer -->
    <div id="code-panel"></div>

    <!-- DIVIDER — draggable resize handle -->
    <div id="panel-divider"></div>

    <!-- VISUALIZER — canvas + overlays -->
    <div id="visualizer-area">
      <!-- MAIN CANVAS — Three.js renders here -->
      <canvas id="seeds-canvas"></canvas>

      <!-- ERROR BADGE — compact floating button (replaces large panel) -->
      <div id="error-badge"></div>
    </div>
  </div>

  <!-- FLOATING ERROR PANEL — slides in from right when clicked -->
  <div id="floating-error-panel"></div>

  <!-- BOTTOM PLAYBACK BAR -->
  <div id="playback-bar"></div>

  <!-- LOADING OVERLAY -->
  <div id="app-loading" class="app-loading">
    <div class="app-loading__spinner"></div>
    <div class="app-loading__text">Loading SeeDS…</div>
  </div>

  <!-- Entry point -->
  <script type="module" src="./src/core/app.js"></script>

</body>
</html>
